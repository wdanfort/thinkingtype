# Decision-gate experiment v2: model-upgrade drift run
#
# Same gates, stimuli, variants, render, and calibration protocol as
# gates_v1; only the models change. Purpose: per-release drift tracking
# (gates-drift gates_v1 vs gates_v2 per provider).
#
#   openai:    gpt-5.5        -> gpt-5.6-sol   (GA 2026-07-09)
#   anthropic: claude-sonnet-5 -> claude-fable-5 (GA 2026-06-09)
#   google:    omitted — Gemini 3.5 Flash is still the newest GA model,
#              so the gates_v1 leg remains current.
#
# Fable-5 note: classifier declines now surface as stop_reason "refusal"
# (HTTP 200); the anthropic provider tags these "[REFUSAL]" in
# raw_response. Check refusal counts in logs before analyzing.

run_tag: gates_v2
seed: 42

gates:
  - resume
  - moderation
  - appeal

calibration:
  repeats: 8
  band: [0.15, 0.85]
  n_select: 20

vision:
  repeats: 6

variants:
  - id: T1_serif
    font_file: LiberationSerif-Regular.ttf

  - id: T3_sans
    font_file: LiberationSans-Regular.ttf

  - id: T7_comic
    font_file: ComicNeue-Regular.ttf

  - id: A1_opendyslexic
    font_file: OpenDyslexic-Regular.otf

  - id: A2_large_sans
    font_file: LiberationSans-Regular.ttf
    size_scale: 1.5

  - id: C1_red
    font_file: LiberationSans-Regular.ttf
    text_color: "#B00000"

  - id: C2_gray
    font_file: LiberationSans-Regular.ttf
    text_color: "#8C8C8C"

  - id: H1_highlight
    font_file: LiberationSans-Regular.ttf
    highlight_color: "#FFF2A8"

  - id: L1_cramped
    font_file: LiberationSans-Regular.ttf
    size_scale: 0.75
    line_spacing: 1.0

render:
  image_width: 1400
  base_size: 40
  padding_x: 90
  padding_y: 70
  max_text_width: 1220
  font_normalization: ag_height

providers:
  openai:
    api_key_env: OPENAI_API_KEY
    model_text: gpt-5.6-sol
    model_vision: gpt-5.6-sol
    # service_tier deliberately unset: flex not yet verified for the 5.6
    # family; standard tier keeps the run unblocked at trivial cost.
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    model_text: claude-fable-5
    model_vision: claude-fable-5

inference:
  temperature: null  # reasoning-era models reject explicit temperature
  max_retries: 6
  rate_limit_sleep: 1.5
  workers: 8
  seed: 42
